name: build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  todo-model-tests:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Configure tests
        run: cmake -S . -B build -DXTODO_BUILD_APP=OFF -DXTODO_BUILD_TESTS=ON

      - name: Build tests
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release

  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure (MSVC, x64)
        run: cmake -B build -A x64

      - name: Build (MinSizeRel)
        run: cmake --build build --config MinSizeRel

      - name: Upload exe
        uses: actions/upload-artifact@v7
        with:
          name: x-todo
          path: build/MinSizeRel/x-todo.exe
          if-no-files-found: error

  auto-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, todo-model-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps['version-tag'].outputs.created }}
      tag: ${{ steps['version-tag'].outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Create tag if VERSION changed
        id: version-tag
        run: |
          if ! git diff HEAD~1 --name-only | grep -q '^VERSION$'; then
            echo "VERSION not changed, skip"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="v$(cat VERSION | tr -d '[:space:]')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "$TAG" | grep -q .; then
            echo "Tag $TAG already exists, skip"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

  release:
    if: >-
      ${{
        always() &&
        needs.build.result == 'success' &&
        needs['todo-model-tests'].result == 'success' &&
        (
          startsWith(github.ref, 'refs/tags/v') ||
          (
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            needs['auto-tag'].result == 'success' &&
            needs['auto-tag'].outputs.created == 'true'
          )
        )
      }}
    needs: [build, todo-model-tests, auto-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download exe
        uses: actions/download-artifact@v8
        with:
          name: x-todo
          path: dist

      - name: Resolve release tag
        id: release-tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="${{ needs['auto-tag'].outputs.tag }}"
          fi
          if [[ -z "$TAG" ]]; then
            echo "No release tag resolved" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate size badge endpoint
        run: |
          python3 - <<'PY'
          import json, os
          size = os.path.getsize("dist/x-todo.exe")
          if size >= 1024 * 1024:
              n, unit = size / (1024 * 1024), "MiB"
          else:
              n, unit = size / 1024, "KiB"
          msg = f"{n:.1f}".removesuffix(".0")
          badge = {"schemaVersion": 1, "label": "exe", "message": f"{msg} {unit}", "color": "2EA043"}
          with open("dist/size-badge.json", "w", encoding="utf-8") as f:
              json.dump(badge, f, separators=(",", ":"))
          PY

      - name: Publish GitHub Release
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "dist/x-todo.exe#x-todo.exe" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "dist/x-todo.exe#x-todo.exe" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps['release-tag'].outputs.tag }}

      - name: Publish size badge endpoint
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          if git show-ref --verify --quiet refs/remotes/origin/badges; then
            git switch --force-create badges origin/badges
          else
            git switch --orphan badges
          fi
          git rm -rf . >/dev/null 2>&1 || true
          cp dist/size-badge.json size-badge.json
          git add size-badge.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update size badge for $RELEASE_TAG"
          git push origin badges
        env:
          RELEASE_TAG: ${{ steps['release-tag'].outputs.tag }}
