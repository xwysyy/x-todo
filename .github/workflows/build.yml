name: build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure (MSVC, x64)
        run: cmake -B build -A x64

      - name: Build (MinSizeRel)
        run: cmake --build build --config MinSizeRel

      - name: Upload exe
        uses: actions/upload-artifact@v7
        with:
          name: x-todo
          path: build/MinSizeRel/x-todo.exe
          if-no-files-found: error

  auto-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Create tag if VERSION changed
        run: |
          if ! git diff HEAD~1 --name-only | grep -q '^VERSION$'; then
            echo "VERSION not changed, skip"
            exit 0
          fi
          TAG="v$(cat VERSION | tr -d '[:space:]')"
          if git ls-remote --tags origin "$TAG" | grep -q .; then
            echo "Tag $TAG already exists, skip"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download exe
        uses: actions/download-artifact@v8
        with:
          name: x-todo
          path: dist

      - name: Generate size badge endpoint
        run: |
          python3 - <<'PY'
          import json, os
          size = os.path.getsize("dist/x-todo.exe")
          if size >= 1024 * 1024:
              n, unit = size / (1024 * 1024), "MiB"
          else:
              n, unit = size / 1024, "KiB"
          msg = f"{n:.1f}".removesuffix(".0")
          badge = {"schemaVersion": 1, "label": "exe", "message": f"{msg} {unit}", "color": "2EA043"}
          with open("dist/size-badge.json", "w", encoding="utf-8") as f:
              json.dump(badge, f, separators=(",", ":"))
          PY

      - name: Publish GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/x-todo.exe#x-todo.exe" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish size badge endpoint
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          if git show-ref --verify --quiet refs/remotes/origin/badges; then
            git switch --force-create badges origin/badges
          else
            git switch --orphan badges
          fi
          git rm -rf . >/dev/null 2>&1 || true
          cp dist/size-badge.json size-badge.json
          git add size-badge.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update size badge for $GITHUB_REF_NAME"
          git push origin badges
