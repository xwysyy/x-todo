name: build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (MSVC, x64)
        run: cmake -B build -A x64

      - name: Build (MinSizeRel)
        run: cmake --build build --config MinSizeRel

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: x-todo
          path: build/MinSizeRel/x-todo.exe
          if-no-files-found: error
